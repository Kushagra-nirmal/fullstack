<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            empty-cells: hide;
        }
    </style>
</head>

<body>
    <table border="1" width="100%" cellspacing="0">
        <tr>
            <th rowspan="3">Day</th>
            <th colspan="3">Seminar</th>
        </tr>
        <tr>
            <th colspan="2">Schedule</th>
            <th rowspan="2">Topic</th>
        </tr>
        <tr>
            <td>Begin</td>
            <td>End</td>
        </tr>
        <tr>
            <td rowspan="2">Monday</td>
            <td rowspan="2">8:00 AM</td>
            <td rowspan="2">5:00 PM</td>
            <td>Intro to XML</td>
        </tr>
        <tr>
            <td>Validity: DTD and Relax NG</td>
        </tr>
        <tr>
            <td rowspan="3">
                Tuesday
            </td>
            <td>
                8:00 AM
            </td>
            <td>11:00 AM</td>
            <td rowspan="3">
                <table border="1" width="100%" height="100px">
                    <tr>
                        <td>XPATH</td>
                    </tr>
                    <tr>
                        <td>XSL Transformation</td>
                    </tr>
                </table>
            </td>
        </tr>

        <tr>
            <td>11:00 AM</td>
            <td>2:00PM</td>
        </tr>
        <tr>
            <td>2:00 PM</td>
            <td>5:00 PM</td>
        </tr>
        <tr>
            <td>Wednesday</td>
            <td>8:00 AM</td>
            <td>12:00 PM</td>
            <td>XSL Formatting Objects</td>
        </tr>
    </table>
</body>

</html>
