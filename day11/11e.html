    <script>
        function sum(...a) {
            console.log(a);
         let result = a.reduce((sum,num) =>{
            return sum + num;
         },0);
         console.log("SUM= "+result);
         return result;
        }
        sum(11);
        sum(11,22);
        sum(11,22,33);
    </script>
