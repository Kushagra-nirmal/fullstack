<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Table</title>
</head>
<body>

<h2>Multiplication Table Generator</h2>

<label>Box A (Number): </label>
<input type="number" id="boxA" value="2">

<br><br>

<label>Box B (Stop Value): </label>
<input type="number" id="boxB" value="10">

<br><br>

<button onclick="showTable()">Show Table</button>

<h3>Result:</h3>
<p id="result"></p>

<script>
function showTable() {

    let num = Number(document.getElementById("boxA").value);
    let limit = Number(document.getElementById("boxB").value);

    let output = "";

    for (let i = 1; num * i <= limit; i++) {
        output += num + " × " + i + " = " + (num * i) + "<br>";
    }

    document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
