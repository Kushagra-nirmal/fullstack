<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = [10,20,30,];
        console.log(a);
// To add element at the end
        a.push("AIML");
        console.log(a);
// to add element form the end
        a.pop();
        console.log(a);
// to add element at the starting
        a.unshift("hello");
        console.log(a);
// to remove form the first
        a.shift();
        console.log(a);
//slice -> copy of array from  x index to y index
        let c = a.slice(3,0);
        console.log(c);
//Splice ->
// 1. to remove part of array
        a.splice(1,2); // start form 1st index and remove 2 number of elements
        console.log(a);
// 2. Replace part of array
        a.splice(2.2, "Abhishek", "Utkarsh"); // Start form 2nd index delete two 2 elements add 2 elements
        console.log(a);
// 3. Add into part of array
        a.splice(4,0,11,22,33,44);
        console.log(a);
    </script>
</body>
</html>
